name: Competition Results Monitor

on:
  schedule:
    # 06:00 IST / 05:00 UTC
    - cron: '0 5 * * *'
    # 13:00 IST / 12:00 UTC
    - cron: '0 12 * * *'
    # 22:00 IST / 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write   # needed for gh-pages deployment

jobs:
  check-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore previous baselines
        uses: actions/cache@v4
        with:
          path: competition_baselines/
          key: comp-baselines-${{ github.run_number }}
          restore-keys: |
            comp-baselines-

      - name: Run competition results monitor
        run: python -m competition_monitor
        env:
          DISPLAY: ':99'
          COMP_NTFY_QUIET: '1'
          COMP_AGE_GROUPS: 'u14'

      - name: Generate dashboard
        if: always()
        run: python generate_dashboard.py
        env:
          COMP_AGE_GROUPS: 'u14'

      - name: Upload baselines as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: competition-baselines-${{ github.run_number }}
          path: competition_baselines/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload dashboard as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.run_number }}
          path: dashboard/
          if-no-files-found: ignore
          retention-days: 30

      - name: Deploy dashboard to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          keep_files: false

      - name: Save baselines for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: competition_baselines/
          key: comp-baselines-${{ github.run_number }}
